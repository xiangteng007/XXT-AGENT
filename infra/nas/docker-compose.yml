# OpenClaw NAS Data Plane — Docker Compose
# 部署目標：NAS（Synology / 自建 Linux）
#
# 服務：
#   - qdrant     向量資料庫（1536-dim embeddings，nomic-embed-text）
#   - redis      ContextStore L2 + session TTL
#   - postgres   可選：本地備份 + 長期分析查詢
#   - minio      Asset 儲存（PixelLab sprites、模型快取）
#
# 使用方法：
#   cp .env.example .env
#   docker compose up -d
#   docker compose ps

version: "3.9"

networks:
  openclaw-net:
    driver: bridge

volumes:
  qdrant_data:
  redis_data:
  postgres_data:
  minio_data:

services:
  # ── Qdrant 向量資料庫 ──────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: openclaw-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"   # REST API
      - "${QDRANT_GRPC_PORT:-6334}:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__SERVICE__HTTP_PORT: 6333
      # API Key（Cloudflare Tunnel 後層）
      QDRANT__SERVICE__API_KEY: "${QDRANT_API_KEY}"
    networks:
      - openclaw-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: openclaw-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --requirepass "${REDIS_PASSWORD}"
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    networks:
      - openclaw-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 20s
      timeout: 5s
      retries: 3

  # ── MinIO（S3-compatible 物件儲存）─────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-05-10T01-41-38Z
    container_name: openclaw-minio
    restart: unless-stopped
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER:     "${MINIO_ROOT_USER:-openclaw}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
    command: server /data --console-address ":9001"
    networks:
      - openclaw-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── PostgreSQL（可選：結構化資料 + 長期分析）──────────────
  postgres:
    image: postgres:16-alpine
    container_name: openclaw-postgres
    restart: unless-stopped
    profiles: ["full"]   # 啟用：docker compose --profile full up -d
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      POSTGRES_USER:     "${POSTGRES_USER:-openclaw}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB:       "${POSTGRES_DB:-openclaw}"
    networks:
      - openclaw-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openclaw}"]
      interval: 20s
      timeout: 5s
      retries: 3
