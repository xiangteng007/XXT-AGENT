version: '3.8'

services:
  # Firestore Emulator for database testing
  firestore:
    image: mtlynch/firestore-emulator-docker
    environment:
      - FIRESTORE_PROJECT_ID=test-project
    ports:
      - "8080:8080"

  # Ollama for local LLM integration testing
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
