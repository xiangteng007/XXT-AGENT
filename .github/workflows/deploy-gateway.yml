name: Deploy OpenClaw Gateway

on:
  push:
    branches: [main]
    paths:
      - 'services/openclaw-gateway/**'
      - 'packages/types/**'
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deploy even without path changes'
        type: boolean
        default: false

env:
  PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
  REGION: asia-east1
  SERVICE_NAME: openclaw-gateway
  IMAGE: asia-east1-docker.pkg.dev/${{ secrets.FIREBASE_PROJECT_ID }}/openclaw/gateway

jobs:
  typecheck-test:
    name: TypeScript & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'services/openclaw-gateway/package-lock.json'

      - name: Install dependencies
        run: |
          cd packages/types && npm ci --prefer-offline
          cd ../../services/openclaw-gateway && npm ci --prefer-offline

      - name: "Run Unit Tests (D-02)"
        working-directory: services/openclaw-gateway
        run: npm test

      - name: TypeScript Check
        working-directory: services/openclaw-gateway
        run: npx tsc --noEmit

  build-image:
    name: Build & Image Scan
    needs: typecheck-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker
        run: gcloud auth configure-docker asia-east1-docker.pkg.dev --quiet

      - name: "Build Docker Image (D-03: context=root)"
        run: |
          docker build \
            --tag ${{ env.IMAGE }}:${{ github.sha }} \
            --tag ${{ env.IMAGE }}:latest \
            --build-arg BUILD_SHA=${{ github.sha }} \
            --file services/openclaw-gateway/Dockerfile \
            .

      - name: "Run Trivy Scan (D-05)"
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'

      - name: Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Push Image
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

  deploy-staging:
    name: Deploy to Staging
    needs: build-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      staging_url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - name: "Deploy to Cloud Run (Staging Tag)"
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}:${{ github.sha }}
          # 關鍵：帶上 staging tag 且不切流量
          flags: '--tag staging --no-traffic --allow-unauthenticated'
          env_vars: |
            DEPLOY_MODE=staging
            NODE_ENV=production
            PORT=3100
            CORS_ALLOWED_ORIGINS=https://xxt-agent-dashboard-staging.vercel.app
          secrets: |
            REDIS_URL=openclaw-redis-url:latest
            QDRANT_API_KEY=openclaw-qdrant-api-key:latest

  smoke-test:
    name: Staging Smoke Test
    needs: deploy-staging
    runs-on: ubuntu-latest
    steps:
      - name: "Verify Staging Health"
        run: |
          STAGING_URL="https://staging---${{ env.SERVICE_NAME }}-asia-east1.a.run.app"
          echo "Testing Staging URL: $STAGING_URL"
          for i in {1..5}; do
            STATUS=$(curl -sf "$STAGING_URL/health" | grep -o '"status":"ok"' || echo "fail")
            if [ "$STATUS" = '"status":"ok"' ]; then
              echo "✅ Staging health check passed"
              exit 0
            fi
            echo "Waiting for staging to be ready... ($i/5)"
            sleep 10
          done
          echo "❌ Staging health check failed"
          exit 1

  deploy-prod:
    name: Promote to Production
    needs: smoke-test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: "Promote Staging to Production (100% Traffic)"
        run: |
          gcloud run services update-traffic ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --to-revisions staging=100
