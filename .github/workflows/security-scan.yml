name: Security Scan

on:
    pull_request:
        branches: [main]
    schedule:
        # Run weekly on Sundays at midnight
        - cron: "0 0 * * 0"

permissions:
    contents: read
    security-events: write

jobs:
    dependency-scan:
        name: Dependency Security Scan
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Install pnpm
              uses: pnpm/action-setup@v4

            - name: Install dependencies (monorepo root)
              run: pnpm install --frozen-lockfile

            # Functions audit
            - name: Run npm audit (Functions)
              run: pnpm audit --audit-level=high || true
              working-directory: apps/functions

            # Dashboard audit
            - name: Run npm audit (Dashboard)
              run: pnpm audit --audit-level=high || true
              working-directory: apps/dashboard

            # Gateway audit (M-10: 之前遺漏)
            - name: Run npm audit (Gateway)
              run: pnpm audit --audit-level=high || true
              working-directory: services/openclaw-gateway

    codeql-analysis:
        name: CodeQL Analysis
        runs-on: ubuntu-latest

        strategy:
            fail-fast: false
            matrix:
                language: ["javascript", "typescript", "python"]

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Initialize CodeQL
              uses: github/codeql-action/init@v3
              with:
                  languages: ${{ matrix.language }}

            - name: Autobuild
              uses: github/codeql-action/autobuild@v3

            - name: Perform CodeQL Analysis
              uses: github/codeql-action/analyze@v3
              with:
                  category: "/language:${{matrix.language}}"

    secrets-scan:
        name: Secret Detection
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Run Gitleaks
              uses: gitleaks/gitleaks-action@v2
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
