name: Gateway E2E Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'services/openclaw-gateway/**'
      - 'packages/types/**'
  pull_request:
    branches: [main]
    paths:
      - 'services/openclaw-gateway/**'
      - 'packages/types/**'
  workflow_dispatch:

jobs:
  e2e-tests:
    name: "D-1: E2E Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      DEV_BYPASS_AUTH: 'true'
      NODE_ENV: test
      FIREBASE_PROJECT_ID: xxt-agent-test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'services/openclaw-gateway/package-lock.json'

      - name: Install types package
        run: cd packages/types && npm ci --prefer-offline

      - name: Install gateway dependencies
        run: cd services/openclaw-gateway && npm ci --prefer-offline

      - name: TypeScript Check
        working-directory: services/openclaw-gateway
        run: npx tsc --noEmit

      - name: "Run Unit Tests"
        working-directory: services/openclaw-gateway
        run: npm test

      - name: "Run E2E Tests (D-1)"
        working-directory: services/openclaw-gateway
        run: npm run test:e2e

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: services/openclaw-gateway/test-results.json
          retention-days: 7
