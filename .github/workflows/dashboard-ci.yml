name: Dashboard CI

on:
  push:
    branches: [main]
    paths:
      - "apps/dashboard/**"
      - "packages/**"
      - ".github/workflows/dashboard-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/dashboard/**"
      - "packages/**"

jobs:
  type-check-and-lint:
    name: Dashboard Type Check & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      # pnpm install 必須在 monorepo root 執行，才能正確連結 packages/types
      - name: Install dependencies (monorepo root)
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        working-directory: apps/dashboard
        run: npx tsc --noEmit

      - name: Lint
        working-directory: apps/dashboard
        run: pnpm run lint || true

      - name: Build
        working-directory: apps/dashboard
        run: pnpm run build

      - name: "Run Lighthouse CI (F-03: performance gate)"
        working-directory: apps/dashboard
        run: npx lhci autorun || true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Security audit
        working-directory: apps/dashboard
        run: pnpm audit --audit-level=high || true
